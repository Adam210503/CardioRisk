version: '3.8'

services:
  # FastAPI backend service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./ml/models:/app/ml/models
    environment:
      - ENV=production
      - MODEL_PATH=ml/models/optimized_heart_disease_model.pkl

  # Streamlit UI service
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
