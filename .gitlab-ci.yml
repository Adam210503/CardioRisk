stages:
  - lint
  - test
  - build

# Global cache for Python dependencies to speed up pipeline execution
cache:
  paths:
    - .cache/pip
    - venv/

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ==========================================
# 1. LINT STAGE: Check code style consistency
# ==========================================
linting:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install flake8
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

# ==========================================
# 2. TEST STAGE: Validate ML engine & logic
# ==========================================
unit_tests:
  stage: test
  image: python:3.11-slim
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r requirements.txt
    - pip install pytest
    # Runs any unit tests you write (e.g., checking data validation inputs)
    - pytest --exitfirst

# ==========================================
# 3. BUILD STAGE: Build & Package Docker Containers
# ==========================================
build_backend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind  # Docker-in-Docker to allow image builds inside GitLab
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Log in to GitLab's built-in Container Registry safely using pipeline tokens
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    # Build the FastAPI backend image
    - docker build -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA -f Dockerfile.backend .
    - docker tag $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE/backend:latest
    # Push both the exact commit tag and 'latest' tag to the registry
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  only:
    - main  # Only build images when code is merged into the main branch

build_frontend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    # Build the Streamlit frontend image
    - docker build -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA -f Dockerfile.frontend .
    - docker tag $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE/frontend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  only:
    - main